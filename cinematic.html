  <!-- ── FadingVideo ────────────────────────────────────────────── -->
  <script type="text/babel">
    const { useRef, useEffect } = React;

    const FADE_MS      = 500;
    const FADE_OUT_LEAD = 0.55;

    function FadingVideo({ src, className, style }) {
      const videoRef    = useRef(null);
      const rafRef      = useRef(null);
      const fadingOutRef = useRef(false);

      function fadeTo(video, target, duration) {
        cancelAnimationFrame(rafRef.current);
        const start        = performance.now();
        const startOpacity = parseFloat(video.style.opacity) || 0;
        function tick(now) {
          const progress = Math.min((now - start) / duration, 1);
          video.style.opacity = startOpacity + (target - startOpacity) * progress;
          if (progress < 1) rafRef.current = requestAnimationFrame(tick);
        }
        rafRef.current = requestAnimationFrame(tick);
      }

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        function onLoadedData() {
          video.style.opacity = 0;
          video.play().catch(() => {});
          fadeTo(video, 1, FADE_MS);
        }

        function onTimeUpdate() {
          const remaining = video.duration - video.currentTime;
          if (!fadingOutRef.current && video.duration && remaining <= FADE_OUT_LEAD && remaining > 0) {
            fadingOutRef.current = true;
            fadeTo(video, 0, FADE_MS);
          }
        }

        function onEnded() {
          video.style.opacity = 0;
          setTimeout(() => {
            video.currentTime = 0;
            video.play().catch(() => {});
            fadingOutRef.current = false;
            fadeTo(video, 1, FADE_MS);
          }, 100);
        }

        video.addEventListener('loadeddata', onLoadedData);
        video.addEventListener('timeupdate', onTimeUpdate);
        video.addEventListener('ended',      onEnded);

        return () => {
          cancelAnimationFrame(rafRef.current);
          video.removeEventListener('loadeddata', onLoadedData);
          video.removeEventListener('timeupdate', onTimeUpdate);
          video.removeEventListener('ended',      onEnded);
        };
      }, []);

      return (
        <video
          ref={videoRef}
          src={src}
          autoPlay
          muted
          playsInline
          preload="auto"
          className={className}
          style={{ ...style, opacity: 0 }}
        />
      );
    }

    window.FadingVideo = FadingVideo;
  </script>

  <!-- ── BlurText ───────────────────────────────────────────────── -->
  <script type="text/babel">
    const { useRef: useRefBT, useEffect: useEffectBT, useState: useStateBT } = React;
    const { motion } = window.Motion;

    function BlurText({ text, className }) {
      const containerRef = useRefBT(null);
      const [triggered, setTriggered] = useStateBT(false);
      const words = text.split(' ');

      useEffectBT(() => {
        const el = containerRef.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) setTriggered(true); },
          { threshold: 0.1 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);

      return (
        <p
          ref={containerRef}
          className={className}
          style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}
        >
          {words.map((word, i) => (
            <motion.span
              key={i}
              initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
              animate={triggered
                ? { filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
                    opacity: [0, 0.5, 1],
                    y:       [50, -5, 0] }
                : {}}
              transition={{ duration: 0.7, delay: (i * 100) / 1000, ease: 'easeOut', times: [0, 0.5, 1] }}
              style={{ display: 'inline-block', marginRight: '0.28em' }}
            >
              {word}
            </motion.span>
          ))}
        </p>
      );
    }

    window.BlurText = BlurText;
  </script>

  <script type="text/babel">

    const _origErr = console.error;
    console.error = (...args) => {
      if (typeof args[0] === 'string' && args[0].includes('Each child in a list')) return;
      _origErr(...args);
    };

    function App() {

        <>

          <Capabilities />
